<div class="info-card">
    <h3>System Information</h3>
    <div class="info-grid">
        <span class="info-label">Hostname:</span>
        <span class="info-value">{{sos['hostname']}}</span>

        <span class="info-label">Time Zone:</span>
        <span class="info-value">{{sos['timezone']}}</span>

        <span class="info-label">Satellite Version:</span>
        <span class="info-value">{{sos['satversion']}}</span>

        <span class="info-label">Tuning:</span>
        <span class="info-value">{{sos['tuning']}}</span>

        <span class="info-label">CPU:</span>
        <span class="info-value">{{sos['cpu']}}</span>

        <span class="info-label">RAM:</span>
        <span class="info-value"><pre>{{sos['ram']}}</pre></span>
    </div>
</div>
